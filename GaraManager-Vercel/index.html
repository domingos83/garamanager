<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GaraManager – Vodafone & WindTre</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f5f4f0;font-family:'DM Sans',sans-serif;color:#1a1a1a;}
    #root{min-height:100vh;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── API call → passa per /api/chat (sicuro, la key è su Vercel) ──
async function callClaude(messages) {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2500,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || "Errore API");
  }
  const data = await res.json();
  return data.content?.map(b => b.text || "").join("") || "";
}

// ─── localStorage ─────────────────────────────────────────────────
const LS = {
  get: (k, fb = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

function detectOp(name) {
  const n = name.toLowerCase();
  if (n.includes("vodafone") || n.includes("voda")) return "vodafone";
  if (n.includes("wind") || n.includes("tre")) return "windtre";
  return "other";
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

const C = {
  bg:"#f5f4f0", surface:"#ffffff", surface2:"#f0efe9", border:"#e2e0d8", borderDark:"#ccc9be",
  voda:"#e60000", vodaLight:"#fff0f0", vodaBorder:"#f5c6c6",
  wind:"#ff6600", windLight:"#fff4ed", windBorder:"#ffd4b0",
  accent:"#1a1a2e", accentLight:"#eeeef8",
  gold:"#b8860b", goldLight:"#fffaed", goldBorder:"#e8d88a",
  text:"#1a1a1a", textMid:"#555550", textMuted:"#999990",
  success:"#2a7a4a", successLight:"#f0fff5",
  warn:"#c04a00", red:"#cc2200",
};

const NAV = [
  { id:"client",  icon:"👤", label:"Cliente"  },
  { id:"archive", icon:"📁", label:"Archivio" },
  { id:"phones",  icon:"📱", label:"Telefoni" },
];

// ══════ APP ═══════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState("client");
  const [docs,      setDocs]      = useState(() => LS.get("gm_docs", []));
  const [stock,     setStock]     = useState(() => LS.get("gm_stock", []));
  const [phoneDocs, setPhoneDocs] = useState(() => LS.get("gm_phonedocs", []));

  useEffect(() => { LS.set("gm_docs",      docs);      }, [docs]);
  useEffect(() => { LS.set("gm_stock",     stock);     }, [stock]);
  useEffect(() => { LS.set("gm_phonedocs", phoneDocs); }, [phoneDocs]);

  return (
    <div className="app">
      <style>{css}</style>
      <header className="topbar">
        <div className="topbar-logo">
          <span style={{fontSize:28}}>📡</span>
          <div>
            <div className="topbar-name">GaraManager</div>
            <div className="topbar-sub">Assistente vendite · Vodafone &amp; WindTre</div>
          </div>
        </div>
        <nav className="topbar-nav">
          {NAV.map(n => (
            <button key={n.id} className={`nav-btn${tab===n.id?" active":""}`} onClick={() => setTab(n.id)}>
              <span>{n.icon}</span><span className="nav-label"> {n.label}</span>
            </button>
          ))}
        </nav>
      </header>
      <main className="content">
        {tab === "archive" && <ArchiveTab docs={docs} setDocs={setDocs} phoneDocs={phoneDocs} setPhoneDocs={setPhoneDocs} />}
        {tab === "phones"  && <PhonesTab stock={stock} setStock={setStock} phoneDocs={phoneDocs} />}
        {tab === "client"  && <ClientTab docs={docs} stock={stock} phoneDocs={phoneDocs} />}
      </main>
    </div>
  );
}

// ══════ ARCHIVE ═══════════════════════════════════════════════════
function ArchiveTab({ docs, setDocs, phoneDocs, setPhoneDocs }) {
  const [dg, setDg] = useState(false);
  const [dp, setDp] = useState(false);
  const rg = useRef(); const rp = useRef();

  async function addFiles(files, target) {
    const ok = Array.from(files).filter(f => f.type === "application/pdf" || f.type.startsWith("image/"));
    const entries = await Promise.all(ok.map(async f => ({
      id: Date.now() + Math.random(), name: f.name, type: f.type,
      operator: detectOp(f.name), base64: await toBase64(f),
      mediaType: f.type, addedAt: new Date().toLocaleDateString("it-IT"),
    })));
    if (target === "gara") setDocs(p => [...p, ...entries]);
    else setPhoneDocs(p => [...p, ...entries]);
  }

  return (
    <div className="two-col">
      <section className="panel">
        <div className="panel-head">
          <span className="ph-icon" style={{background:C.accentLight}}>📋</span>
          <div><div className="panel-title">Lettere di Gara</div><div className="panel-sub">Vodafone & WindTre · aggiorna ogni mese</div></div>
        </div>
        <div className="panel-body">
          <DropZone dragging={dg}
            onDragOver={e=>{e.preventDefault();setDg(true);}} onDragLeave={()=>setDg(false)}
            onDrop={e=>{e.preventDefault();setDg(false);addFiles(e.dataTransfer.files,"gara");}}
            onClick={()=>rg.current.click()}
            label="PDF o foto delle lettere di gara" sub="Vodafone · WindTre · PDF o JPG/PNG" />
          <input ref={rg} type="file" accept=".pdf,image/*" multiple style={{display:"none"}}
            onChange={e=>addFiles(e.target.files,"gara")} />
          <FileList files={docs} onRemove={id=>setDocs(p=>p.filter(x=>x.id!==id))} />
        </div>
      </section>

      <section className="panel">
        <div className="panel-head">
          <span className="ph-icon" style={{background:C.vodaLight}}>📱</span>
          <div><div className="panel-title">Listino Telefoni Vodafone</div><div className="panel-sub">PDF o foto del listino con rate</div></div>
        </div>
        <div className="panel-body">
          <DropZone dragging={dp}
            onDragOver={e=>{e.preventDefault();setDp(true);}} onDragLeave={()=>setDp(false)}
            onDrop={e=>{e.preventDefault();setDp(false);addFiles(e.dataTransfer.files,"phone");}}
            onClick={()=>rp.current.click()}
            label="PDF o foto del listino prezzi e rate" sub="Acconto · RID · Finanziamento · Noleggio" />
          <input ref={rp} type="file" accept=".pdf,image/*" multiple style={{display:"none"}}
            onChange={e=>addFiles(e.target.files,"phone")} />
          <FileList files={phoneDocs} onRemove={id=>setPhoneDocs(p=>p.filter(x=>x.id!==id))} />
        </div>
      </section>
    </div>
  );
}

function DropZone({ dragging, onDragOver, onDragLeave, onDrop, onClick, label, sub }) {
  return (
    <div className={`dropzone${dragging?" dragging":""}`}
      onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop} onClick={onClick}>
      <div style={{fontSize:32,marginBottom:8}}>☁️</div>
      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{label}</div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:10}}>{sub}</div>
      <div className="dz-btn">Seleziona file</div>
    </div>
  );
}

function FileList({ files, onRemove }) {
  if (!files.length) return <div className="empty-hint">Nessun file caricato</div>;
  return (
    <div className="file-list">
      {files.map(f => {
        const op = f.operator;
        const color = op==="vodafone"?C.voda:op==="windtre"?C.wind:C.textMuted;
        const label = op==="vodafone"?"Vodafone":op==="windtre"?"WindTre":"—";
        return (
          <div key={f.id} className="file-row">
            <span style={{fontSize:18}}>{f.type?.startsWith("image")?"🖼️":"📄"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div className="file-name">{f.name}</div>
              <div style={{fontSize:11,color:C.textMuted}}>Aggiunto {f.addedAt}</div>
            </div>
            <span className="op-tag" style={{color,borderColor:color+"50",background:color+"12"}}>{label}</span>
            <button className="rm-btn" onClick={()=>onRemove(f.id)}>✕</button>
          </div>
        );
      })}
    </div>
  );
}

// ══════ PHONES ════════════════════════════════════════════════════
function PhonesTab({ stock, setStock, phoneDocs }) {
  const [form, setForm] = useState({brand:"",model:"",color:"",gb:"",qty:"1"});
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const sf = (k,v) => setForm(p=>({...p,[k]:v}));

  function addPhone() {
    if (!form.brand || !form.model) return;
    setStock(p => [...p, {id:Date.now(), ...form, qty:parseInt(form.qty)||1}]);
    setForm({brand:"",model:"",color:"",gb:"",qty:"1"});
  }

  async function importFromListino() {
    if (!phoneDocs.length) { alert("Carica prima il listino telefoni nell'Archivio!"); return; }
    setImporting(true); setImportResult(null);
    try {
      const content = phoneDocs.map(d => ({
        type: d.type?.startsWith("image") ? "image" : "document",
        source: {type:"base64", media_type:d.mediaType, data:d.base64},
      }));
      const prompt = `Analizza questo listino telefoni Vodafone ed estrai tutti i device.
Rispondi SOLO con JSON valido, nessun testo, nessun markdown.
{"phones":[{"brand":"Samsung","model":"Galaxy A55","gb":"128","color":"","acconto":"99","rata_rid":"9.99","rata_fin":"12.90","noleggio":"","prezzo_pieno":"399"}]}
Se un campo non è disponibile usa stringa vuota. Estrai tutti i modelli.`;
      const raw = await callClaude([{role:"user", content:[...content,{type:"text",text:prompt}]}]);
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setImportResult(parsed.phones || []);
    } catch { setImportResult("error"); }
    setImporting(false);
  }

  return (
    <div className="two-col">
      <section className="panel">
        <div className="panel-head">
          <span className="ph-icon" style={{background:C.accentLight}}>➕</span>
          <div className="panel-title">Aggiungi telefono in stock</div>
        </div>
        <div className="panel-body">
          <div className="fg2">
            <Field label="Marca *"><input className="fi" placeholder="es. Samsung" value={form.brand} onChange={e=>sf("brand",e.target.value)} /></Field>
            <Field label="Modello *"><input className="fi" placeholder="es. Galaxy A55" value={form.model} onChange={e=>sf("model",e.target.value)} /></Field>
            <Field label="Colore"><input className="fi" placeholder="es. Midnight Black" value={form.color} onChange={e=>sf("color",e.target.value)} /></Field>
            <Field label="Storage (GB)"><input className="fi" placeholder="es. 128" value={form.gb} onChange={e=>sf("gb",e.target.value)} /></Field>
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,alignItems:"flex-end",flexWrap:"wrap"}}>
            <Field label="Pezzi" style={{width:90}}>
              <input className="fi" type="number" min="1" value={form.qty} onChange={e=>sf("qty",e.target.value)} />
            </Field>
            <button className="btn-p" onClick={addPhone} disabled={!form.brand||!form.model}>➕ Aggiungi</button>
            <button className="btn-o" onClick={importFromListino} disabled={importing}>
              {importing ? "⏳ Importo…" : "📋 Importa da listino IA"}
            </button>
          </div>

          {importResult && importResult !== "error" && (
            <div className="import-box">
              <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>
                📋 {importResult.length} telefoni trovati — seleziona quelli che hai in negozio:
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:280,overflowY:"auto"}}>
                {importResult.map((p,i) => (
                  <ImportRow key={i} phone={p}
                    onAdd={ph => setStock(prev => [...prev, {id:Date.now()+i, ...ph, qty:1}])} />
                ))}
              </div>
            </div>
          )}
          {importResult === "error" && (
            <div className="warn-box" style={{marginTop:12}}>⚠️ Errore importazione. Controlla che il file sia leggibile.</div>
          )}
        </div>
      </section>

      <section className="panel">
        <div className="panel-head">
          <span className="ph-icon" style={{background:C.successLight}}>📦</span>
          <div>
            <div className="panel-title">Stock Negozio</div>
            <div className="panel-sub">{stock.length} modelli disponibili</div>
          </div>
        </div>
        <div className="panel-body">
          {!stock.length && <div className="empty-hint">Nessun telefono aggiunto ancora</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {stock.map(p => (
              <div key={p.id} className="file-row">
                <span style={{fontSize:22}}>📱</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13}}>{p.brand} {p.model}</div>
                  <div style={{fontSize:11,color:C.textMuted}}>
                    {[p.color, p.gb ? p.gb+" GB" : ""].filter(Boolean).join(" · ")}
                  </div>
                </div>
                <span style={{fontWeight:700,fontSize:12,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px"}}>×{p.qty}</span>
                <button className="rm-btn" onClick={()=>setStock(prev=>prev.filter(x=>x.id!==p.id))}>✕</button>
              </div>
            ))}
          </div>
        </div>
      </section>
    </div>
  );
}

function ImportRow({ phone, onAdd }) {
  const [added, setAdded] = useState(false);
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
      <span style={{fontSize:20}}>📱</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:12}}>{phone.brand} {phone.model}</div>
        <div style={{fontSize:11,color:C.textMuted}}>
          {phone.gb ? phone.gb+" GB" : ""}
          {phone.acconto ? ` · Acc. €${phone.acconto}` : ""}
          {phone.rata_rid ? ` · RID €${phone.rata_rid}/mese` : ""}
        </div>
      </div>
      <button className={`btn-sm${added?" added":""}`}
        onClick={() => { if (!added) { onAdd(phone); setAdded(true); } }}>
        {added ? "✓ Aggiunto" : "+ Stock"}
      </button>
    </div>
  );
}

// ══════ CLIENT ════════════════════════════════════════════════════
function ClientTab({ docs, stock, phoneDocs }) {
  const [form, setForm] = useState({
    budget:"", gb:"", minuti:"illimitati", portabilita:"si", tipo:"privato",
    vuoleTelefono:"no", budgetTel:"", pagamentoTel:"rid", note:"",
  });
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const sf = (k,v) => setForm(p=>({...p,[k]:v}));
  const canGo = docs.length > 0 && form.budget;

  async function analyze() {
    if (!canGo || loading) return;
    setLoading(true); setResults(null);
    try {
      const docContent = docs.map(d => ({
        type: d.type?.startsWith("image") ? "image" : "document",
        source: {type:"base64", media_type:d.mediaType, data:d.base64},
      }));
      const phoneListContent = phoneDocs.map(d => ({
        type: d.type?.startsWith("image") ? "image" : "document",
        source: {type:"base64", media_type:d.mediaType, data:d.base64},
      }));
      const stockText = stock.length
        ? `STOCK NEGOZIO:\n${stock.map(p=>`- ${p.brand} ${p.model} ${p.color||""} ${p.gb?p.gb+"GB":""} (pz: ${p.qty})`).join("\n")}`
        : "Nessun telefono in stock.";
      const wantsPhone = form.vuoleTelefono === "si";

      const prompt = `Sei un consulente esperto di un negozio di telefonia Vodafone/WindTre in Italia.
Hai le lettere di gara mensili e il listino telefoni come allegati.

PROFILO CLIENTE:
- Budget SIM: €${form.budget}/mese
- GB: ${form.gb||"non specificato"}
- Minuti: ${form.minuti}
- Porta numero: ${form.portabilita==="si"?"SÌ":"NO"}
- Tipo: ${form.tipo}
- Vuole telefono: ${wantsPhone?"SÌ":"NO"}
${wantsPhone?`- Budget telefono: ${form.budgetTel?"€"+form.budgetTel:"non specificato"}
- Pagamento telefono: ${form.pagamentoTel}`:""}
- Note: ${form.note||"nessuna"}

${stockText}

COMPITO: Analizza le lettere di gara allegate. Trova 3-5 offerte SIM.
${wantsPhone?"Abbina se possibile un telefono dallo stock del negozio compatibile con budget e pagamento preferito.":"Non suggerire telefoni."}
Ordina per convenienza PER IL NEGOZIANTE (commissioni/bonus gara più alti prima).

Rispondi SOLO con JSON valido, nessun testo, nessun markdown:
{
  "sintesi_gare": "commento breve sulle gare del mese",
  "offerte": [{
    "rank":1, "nome":"Nome offerta", "operatore":"Vodafone o WindTre",
    "prezzo":"€XX/mese", "dettagli":"GB, minuti, 5G ecc.",
    "commissione_negozio":"descrizione compenso per il negozio",
    "perche_conviene_a_te":"spiegazione margine e gara",
    "adatta_al_cliente":true,
    "nota_cliente":"perché è buona o meno per il cliente",
    "pro":["..."], "contro":["..."],
    "telefono_abbinato":null
  }]
}
Per telefono_abbinato usa: {"brand":"...","model":"...","color":"...","gb":"...","acconto":"...","rata":"...","tipo_pagamento":"RID|Finanziamento|Unica|Noleggio","nota":"..."} oppure null.`;

      const raw = await callClaude([{role:"user", content:[...docContent,...phoneListContent,{type:"text",text:prompt}]}]);
      setResults(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) {
      setResults({error: e.message || "Errore sconosciuto"});
    }
    setLoading(false);
  }

  return (
    <div className="client-layout">
      <aside>
        <section className="panel">
          <div className="panel-head">
            <span className="ph-icon" style={{background:C.accentLight}}>👤</span>
            <div className="panel-title">Profilo Cliente</div>
          </div>
          <div className="panel-body">
            {!docs.length && (
              <div className="warn-box" style={{marginBottom:14}}>
                ⚠️ Carica le lettere di gara nell'<strong>Archivio</strong> prima.
              </div>
            )}

            <div className="section-lbl">📶 Offerta SIM</div>
            <div className="fg2">
              <Field label="Budget mensile (€) *">
                <input className="fi" type="number" placeholder="es. 15" value={form.budget} onChange={e=>sf("budget",e.target.value)} />
              </Field>
              <Field label="GB richiesti">
                <input className="fi" placeholder="es. 50" value={form.gb} onChange={e=>sf("gb",e.target.value)} />
              </Field>
              <Field label="Minuti">
                <select className="fs" value={form.minuti} onChange={e=>sf("minuti",e.target.value)}>
                  <option value="illimitati">Illimitati</option>
                  <option value="500">500 min</option>
                  <option value="200">200 min</option>
                  <option value="qualsiasi">Qualsiasi</option>
                </select>
              </Field>
              <Field label="Porta il numero">
                <select className="fs" value={form.portabilita} onChange={e=>sf("portabilita",e.target.value)}>
                  <option value="si">Sì</option>
                  <option value="no">No, nuovo numero</option>
                </select>
              </Field>
              <Field label="Tipo cliente" style={{gridColumn:"1/-1"}}>
                <select className="fs" value={form.tipo} onChange={e=>sf("tipo",e.target.value)}>
                  <option value="privato">Privato</option>
                  <option value="business">Business / P.IVA</option>
                  <option value="under30">Under 30</option>
                  <option value="senior">Senior 60+</option>
                </select>
              </Field>
            </div>

            <div className="section-lbl" style={{marginTop:18}}>📱 Telefono Vodafone</div>
            <div className="radio-row" style={{marginBottom:12}}>
              {[["no","❌ Solo SIM"],["si","✅ Vuole un telefono"]].map(([v,lbl]) => (
                <label key={v} className={`radio-opt${form.vuoleTelefono===v?" active":""}`}>
                  <input type="radio" value={v} checked={form.vuoleTelefono===v}
                    onChange={()=>sf("vuoleTelefono",v)} style={{display:"none"}} />
                  {lbl}
                </label>
              ))}
            </div>
            {form.vuoleTelefono === "si" && (
              <div className="fg2">
                <Field label="Budget telefono (€)">
                  <input className="fi" type="number" placeholder="es. 300" value={form.budgetTel} onChange={e=>sf("budgetTel",e.target.value)} />
                </Field>
                <Field label="Pagamento preferito">
                  <select className="fs" value={form.pagamentoTel} onChange={e=>sf("pagamentoTel",e.target.value)}>
                    <option value="rid">Acconto + rate RID</option>
                    <option value="finanziamento">Finanziamento</option>
                    <option value="unica">Unica soluzione</option>
                    <option value="noleggio">Noleggio</option>
                  </select>
                </Field>
              </div>
            )}

            <Field label="Note aggiuntive" style={{marginTop:12}}>
              <textarea className="fta"
                placeholder="es. ha già Vodafone casa, vuole il 5G, scettico sui vincoli…"
                value={form.note} onChange={e=>sf("note",e.target.value)} />
            </Field>

            <button className={`btn-analyze${canGo&&!loading?" active":""}`}
              onClick={analyze} disabled={!canGo||loading}>
              {loading ? "⏳ Analizzo le gare…" : "🔍 Trova le migliori offerte"}
            </button>
          </div>
        </section>
      </aside>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {loading && (
          <div className="panel" style={{padding:"56px 40px",textAlign:"center"}}>
            <div className="spinner" />
            <div style={{color:C.textMuted,fontSize:14,marginTop:16}}>
              Leggo le lettere di gara e cerco le offerte migliori…
            </div>
          </div>
        )}
        {!loading && !results && (
          <div className="panel" style={{padding:"64px 40px",textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:16}}>🎯</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>Pronto per analizzare</div>
            <div style={{fontSize:13,color:C.textMuted,lineHeight:1.7}}>
              Carica le lettere di gara nell'<strong>Archivio</strong>,<br/>
              compila il profilo cliente e clicca <strong>Trova le migliori offerte</strong>.
            </div>
          </div>
        )}
        {!loading && results?.error && (
          <div className="panel" style={{padding:28,color:C.red}}>
            ⚠️ Errore: {results.error}. Verifica i file caricati e riprova.
          </div>
        )}
        {!loading && results?.sintesi_gare && (
          <div style={{background:C.accentLight,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"14px 18px",display:"flex",gap:12}}>
            <span style={{fontSize:18}}>📊</span>
            <div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"1px",color:C.accent,textTransform:"uppercase",marginBottom:4}}>
                Situazione gare questo mese
              </div>
              <div style={{fontSize:13,lineHeight:1.6}}>{results.sintesi_gare}</div>
            </div>
          </div>
        )}
        {!loading && results?.offerte?.map((o,i) => <OfferCard key={i} offer={o} rank={i} />)}
      </div>
    </div>
  );
}

function OfferCard({ offer:o, rank }) {
  const opColor = o.operatore==="Vodafone" ? C.voda : C.wind;
  const opBg    = o.operatore==="Vodafone" ? C.vodaLight : C.windLight;
  const opBorder= o.operatore==="Vodafone" ? C.vodaBorder : C.windBorder;
  const isTop   = rank === 0;
  return (
    <div className={`offer-card${isTop?" top":""}`} style={{animationDelay:`${rank*0.08}s`}}>
      {isTop && <div className="top-banner">⭐ MIGLIORE PER TE QUESTO MESE</div>}
      <div className="offer-head">
        <div className="offer-rank" style={{
          background:isTop?C.gold:rank===1?"#b0b0b0":C.border,
          color:isTop?"#fff":C.text
        }}>{isTop?"★":rank+1}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:800,letterSpacing:"-0.3px"}}>{o.nome}</div>
          <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{o.dettagli}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
          <span className="op-tag" style={{color:opColor,background:opBg,borderColor:opBorder}}>{o.operatore}</span>
          <span style={{fontSize:16,fontWeight:800,color:C.accent}}>{o.prezzo}</span>
        </div>
      </div>
      <div className="offer-body">
        <div style={{background:C.goldLight,border:`1px solid ${C.goldBorder}`,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:10,fontWeight:800,color:C.gold,letterSpacing:"1px",textTransform:"uppercase",marginBottom:4}}>💰 Per te (negozio)</div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{o.commissione_negozio}</div>
          <div style={{fontSize:12,color:C.textMid}}>{o.perche_conviene_a_te}</div>
        </div>
        <div className="fg2">
          <div style={{background:C.successLight,border:`1px solid ${C.success}25`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:10,fontWeight:800,color:C.success,letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:5}}>✓ Pro</div>
            <ul style={{listStyle:"none",fontSize:12,lineHeight:1.6}}>{o.pro?.map((p,i)=><li key={i}>· {p}</li>)}</ul>
          </div>
          <div style={{background:"#fff8f5",border:`1px solid ${C.warn}25`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:10,fontWeight:800,color:C.warn,letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:5}}>✗ Contro</div>
            <ul style={{listStyle:"none",fontSize:12,lineHeight:1.6}}>{o.contro?.map((c,i)=><li key={i}>· {c}</li>)}</ul>
          </div>
        </div>
        <div style={{
          borderRadius:8,padding:"10px 14px",fontSize:12,fontWeight:600,display:"flex",gap:6,
          background:o.adatta_al_cliente?C.successLight:"#fff8f5",
          border:`1px solid ${o.adatta_al_cliente?C.success+"25":C.warn+"25"}`,
          color:o.adatta_al_cliente?C.success:C.warn,
        }}>
          {o.adatta_al_cliente?"✅":"⚠️"} <span>{o.nota_cliente}</span>
        </div>
        {o.telefono_abbinato && (
          <div style={{background:C.vodaLight,border:`1px solid ${C.vodaBorder}`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:10,fontWeight:800,color:C.voda,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>📱 Telefono da proporre</div>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:30}}>📱</span>
              <div>
                <div style={{fontWeight:800,fontSize:14}}>{o.telefono_abbinato.brand} {o.telefono_abbinato.model}</div>
                <div style={{fontSize:12,color:C.textMid}}>
                  {[o.telefono_abbinato.color, o.telefono_abbinato.gb?o.telefono_abbinato.gb+" GB":""].filter(Boolean).join(" · ")}
                </div>
                <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>
                  {o.telefono_abbinato.tipo_pagamento}
                  {o.telefono_abbinato.acconto ? ` · Acc. €${o.telefono_abbinato.acconto}` : ""}
                  {o.telefono_abbinato.rata ? ` · €${o.telefono_abbinato.rata}/mese` : ""}
                </div>
                <div style={{fontSize:12,color:C.accent,fontStyle:"italic",marginTop:4}}>{o.telefono_abbinato.nota}</div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Field({ label, children, style }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:5,...style}}>
      <label style={{fontSize:11,fontWeight:700,color:C.textMid}}>{label}</label>
      {children}
    </div>
  );
}
